name: Homebrew Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update formula URL and SHA256
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          URL="https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz"
          SHA256="$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')"

          sed -i "s#^  url \".*\"#  url \"${URL}\"#" Formula/macadam-ext.rb
          sed -i "s#^  sha256 \".*\"#  sha256 \"${SHA256}\"#" Formula/macadam-ext.rb

      - name: Commit formula changes
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/macadam-ext.rb; then
            echo "No formula changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/macadam-ext.rb
          git commit -m "chore(homebrew): update formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
